name: live-quotes-relay

# Respaldo del carril rápido (ver live-quotes.yml). Se lanza cuando live-quotes termina y corre el
# mismo loop largo hasta el cierre. Sirve para la cola de la sesión cuando live-quotes llega al tope
# de ~4h50m antes del cierre. Pocos "saltos" por día -> cadena confiable.

on:
  workflow_run:
    workflows: ["live-quotes"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: live-quotes-b   # grupo PROPIO (no compartido) para no auto-cancelarse con live-quotes
  cancel-in-progress: true

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar dependencias
        run: pip install -r data-pipeline/requirements.txt
      - name: Heartbeat de cotizaciones (~60s) o espera si está cerrado
        run: bash data-pipeline/live_loop.sh
        env:
          DATA_DEPLOY_KEY: ${{ secrets.DATA_DEPLOY_KEY }}
