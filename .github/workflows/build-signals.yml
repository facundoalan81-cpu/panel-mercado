name: build-signals

# Corre el job de datos (yfinance) y COMMITEA el JSON al repo.
# Vercel lo lee y redeploya solo. Free: repo público = minutos ilimitados de Actions.
# OJO: los runners de GitHub son IPs de datacenter y Yahoo puede throttlearlas.
# Mitigaciones ya en el código: curl_cffi + descarga en lote + reintentos + health gate.
# Si el bloqueo se vuelve crónico: self-hosted runner (la Mac de Facundo) o proxy residencial.

on:
  schedule:
    # Pipeline PESADO (indicadores + intradía + marcos): cada hora en horario de mercado.
    # La frescura de PRECIOS la lleva build-quotes.yml (cada 5 min, liviano).
    # Offset :07 (no en el tope de hora) -> GitHub dropea/atrasa menos las corridas.
    - cron: "7 13-21 * * 1-5"
  workflow_dispatch: {}        # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write              # para poder commitear el JSON de vuelta al repo

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r data-pipeline/requirements.txt

      - name: Calcular señales (diario + intradía + marcos)
        run: python data-pipeline/build_signals.py

      - name: Publicar JSON al repo (lo lee Vercel)
        run: |
          cp data-pipeline/output/signals-latest.json web/public/data/signals-latest.json
          git config user.name "panel-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/signals-latest.json
          if git diff --cached --quiet; then
            echo "Sin cambios en las señales."
          else
            git commit -m "data: señales $(date -u +%F-%H%M)"
            # Reintento con rebase: si alguien más pusheó a main mientras corríamos, no fallar.
            for i in 1 2 3 4 5; do
              git push && { echo "push ok"; break; }
              echo "push rechazado (race) -> pull --rebase e intento $i"
              git pull --rebase --autostash origin main || true
              sleep 3
            done
          fi

      - name: Guardar JSON como artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-latest
          path: data-pipeline/output/signals-latest.json
          retention-days: 7
