name: live-quotes

# Carril RÁPIDO (~1 min). Estrategia robusta: UN loop largo que corre hasta el cierre del mercado
# (o tope ~4h50m por el límite de 6h del runner), refrescando cada ~70s. Con UN disparo se cubre
# casi toda la sesión SIN saltos frágiles. Para la cola de la sesión (>5h) hay un ping-pong de
# respaldo con live-quotes-relay. schedule a la apertura para arrancar solo (cuando GitHub lo active).
#   - mercado abierto: loop hasta el cierre -> publica quotes-fast.json en `data-fast`.
#   - mercado cerrado: sale (arranca en la próxima apertura).
# Solo papeles calientes (~150: todo AR + ADRs + top US). El front lo lee por /api/quotes-fast.
# Bootstrap: workflow_dispatch.

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["live-quotes-relay"]
    types: [completed]
  schedule:
    - cron: "2 13 * * 1-5"   # arranca a la apertura (cuando GitHub active el cron del repo nuevo)

permissions:
  contents: write
  actions: write   # para despachar build-signals desde el loop

concurrency:
  group: live-quotes-a   # grupo PROPIO (no compartido) para no auto-cancelarse con el relay
  cancel-in-progress: true

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar dependencias
        run: pip install -r data-pipeline/requirements.txt
      - name: Heartbeat de cotizaciones (~60s) o espera si está cerrado
        run: bash data-pipeline/live_loop.sh
        env:
          DATA_DEPLOY_KEY: ${{ secrets.DATA_DEPLOY_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
