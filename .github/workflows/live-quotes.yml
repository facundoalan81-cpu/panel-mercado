name: live-quotes

# Carril RÁPIDO (~1 min) AUTO-SOSTENIDO, sin depender del schedule de GitHub (que en repos nuevos
# tarda en arrancar). Funciona como ping-pong con live-quotes-relay: cada una se relanza cuando la
# otra termina (workflow_run). Así la cadena nunca se corta y cada corrida es un runner nuevo (IP nueva).
#   - mercado abierto: loop interno ~8 min refrescando cada ~60s -> publica quotes-fast.json en `data-fast`.
#   - mercado cerrado: duerme 10 min y sale (la cadena sigue viva, barata).
# Solo papeles calientes (~150: todo AR + ADRs + top US). El front lo lee por /api/quotes-fast.
# Bootstrap: una corrida manual (workflow_dispatch) arranca la cadena.

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["live-quotes-relay"]
    types: [completed]
  schedule:
    - cron: "2 13 * * 1-5"   # red de seguridad: 1 vez al abrir el mercado por si la cadena se corta

permissions:
  contents: write

concurrency:
  group: live-quotes
  cancel-in-progress: true

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar dependencias
        run: pip install -r data-pipeline/requirements.txt
      - name: Heartbeat de cotizaciones (~60s) o espera si está cerrado
        run: bash data-pipeline/live_loop.sh
        env:
          DATA_DEPLOY_KEY: ${{ secrets.DATA_DEPLOY_KEY }}
