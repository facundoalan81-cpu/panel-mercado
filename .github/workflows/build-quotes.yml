name: build-quotes

# Fetch liviano de SOLO cotizaciones (precio + % día), cada ~15 min en horario de mercado.
# Publica quotes-latest.json en el branch `data` (force-push, sin historial) -> el front lo lee
# por raw.githubusercontent (CORS abierto) y refresca precios en vivo SIN redeploy de Vercel.

on:
  schedule:
    # Cada 5 min en horario de mercado (US 13:30-20:00 + AR hasta ~21:00 UTC).
    # Offset :03 (no en el tope de hora) -> GitHub dropea/atrasa menos las corridas.
    - cron: "3-58/5 13-21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

# evita corridas solapadas
concurrency:
  group: build-quotes
  cancel-in-progress: true

jobs:
  quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r data-pipeline/requirements.txt

      - name: Calcular cotizaciones
        run: python data-pipeline/build_quotes.py

      - name: Publicar al branch `data` del repo de DATOS (Vercel no lo mira -> sin deploy)
        env:
          DATA_DEPLOY_KEY: ${{ secrets.DATA_DEPLOY_KEY }}
        run: |
          KEYF="$(mktemp)"; printf '%s\n' "$DATA_DEPLOY_KEY" > "$KEYF"; chmod 600 "$KEYF"
          export GIT_SSH_COMMAND="ssh -i $KEYF -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null"
          rm -rf _pub && mkdir -p _pub && cp data-pipeline/output/quotes-latest.json _pub/quotes-latest.json
          cd _pub
          git init -q
          git config user.name "panel-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -q -b data
          git add quotes-latest.json
          git commit -q -m "quotes $(date -u +%F-%H%M)"
          git push -q -f "git@github.com:facundoalan81-cpu/panel-mercado-data.git" data
